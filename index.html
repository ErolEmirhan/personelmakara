<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f3ff" />
    <meta name="makara-build" content="__MAKARA_BUILD_VERSION__" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MAKARA Personel" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="icons/icon-512.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>MAKARA Mobil</title>
    <style>
      #makara-boot {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        background: #f5f3ff;
        color: #1e1b4b;
        text-align: center;
      }
      #makara-boot-spinner {
        width: 2.5rem;
        height: 2.5rem;
        border: 3px solid #ddd6fe;
        border-top-color: #7c3aed;
        border-radius: 50%;
        animation: makara-spin 0.8s linear infinite;
      }
      #makara-boot-error {
        display: none;
        max-width: 22rem;
      }
      #makara-boot-error.show {
        display: block;
      }
      @keyframes makara-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="padding:2rem;font-family:system-ui,sans-serif;text-align:center;background:#f5f3ff;min-height:100vh">
        <p style="font-weight:700;margin-bottom:0.5rem">JavaScript gerekli</p>
        <p style="font-size:0.875rem;color:#64748b">Bu uygulama JavaScript olmadan çalışmaz. Tarayıcı ayarlarından etkinleştirin.</p>
      </div>
    </noscript>
    <div id="root">
      <div id="makara-boot">
        <div id="makara-boot-spinner"></div>
        <p style="margin-top:1rem;font-size:0.875rem;color:#64748b">Yükleniyor…</p>
        <div id="makara-boot-error">
          <p style="font-weight:700;margin-bottom:0.5rem">Uygulama açılamadı</p>
          <p style="font-size:0.8125rem;color:#64748b;line-height:1.5;margin-bottom:1rem">
            Eski tarayıcı veya bozuk önbellek engelliyor olabilir. Chrome kullanın ve aşağıdaki düğmeyi deneyin.
          </p>
          <button
            type="button"
            id="makara-boot-reset"
            style="padding:0.75rem 1.25rem;border-radius:0.75rem;border:none;background:#7c3aed;color:#fff;font-weight:700;font-size:0.875rem"
          >
            Önbelleği temizle ve yenile
          </button>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var bootOk = false;
        window.__makaraMarkBootOk = function () {
          bootOk = true;
        };
        function showBootError() {
          if (bootOk) return;
          var spinner = document.getElementById('makara-boot-spinner');
          var errorBox = document.getElementById('makara-boot-error');
          if (spinner) spinner.style.display = 'none';
          if (errorBox) errorBox.classList.add('show');
        }
        window.addEventListener('error', showBootError);
        window.addEventListener('unhandledrejection', showBootError);
        setTimeout(showBootError, 20000);
        var resetBtn = document.getElementById('makara-boot-reset');
        if (resetBtn) {
          resetBtn.addEventListener('click', function () {
            var path = window.location.pathname || '/';
            window.location.href = path + (path.indexOf('?') >= 0 ? '&' : '?') + 'reset-sw=1';
          });
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
